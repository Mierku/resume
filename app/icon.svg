    <use href="#fat-petal-path" transform="rotate(225, 100, 100)" fill="#f59e0b" />
    <use href="#fat-petal-path" transform="rotate(315, 100, 100)" fill="#f59e0b" />
    <circle cx="100" cy="100" r="8" fill="#000000" />
    <circle cx="100" cy="100" r="2.5" fill="#f59e0b" opacity="0.9" />
  </g>
</svg>
