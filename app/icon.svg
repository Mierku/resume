<svg id="flower-mono-45" width="220" height="220" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="fat-petal-path" d="M100,105 Q145,60 100,20 Q55,60 100,105 Z" />
    <filter id="bloom-mono">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
