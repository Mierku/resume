name: CD (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare remote deploy path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload docker compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi

            if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "GHCR_USERNAME or GHCR_TOKEN is empty"
              exit 1
            fi

            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f "docker-compose.prod.yml" ]; then
              echo "docker-compose.prod.yml not found under DEPLOY_PATH"
              exit 1
            fi

            # Optional: write .env from GitHub secret DEPLOY_ENV_B64.
            if [ -n "${{ secrets.DEPLOY_ENV_B64 }}" ]; then
              echo "${{ secrets.DEPLOY_ENV_B64 }}" | base64 -d > .env
              chmod 600 .env
            fi

            if [ ! -f ".env" ]; then
              echo ".env not found under DEPLOY_PATH and DEPLOY_ENV_B64 is empty"
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                curl -fsSL https://get.docker.com | sh
              elif command -v sudo >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
              else
                echo "docker is not installed and sudo is unavailable"
                exit 1
              fi
            fi

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              elif command -v sudo >/dev/null 2>&1 && sudo docker info >/dev/null 2>&1; then
                sudo docker "$@"
              else
                echo "cannot access docker daemon"
                exit 1
              fi
            }

            echo "${{ secrets.GHCR_TOKEN }}" | docker_cmd login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export IMAGE_NAME="ghcr.io/${{ github.repository }}"
            export IMAGE_TAG="sha-${{ github.sha }}"

            docker_cmd compose -f docker-compose.prod.yml pull app
            docker_cmd compose -f docker-compose.prod.yml run --rm app pnpm exec prisma migrate deploy
            docker_cmd compose -f docker-compose.prod.yml up -d --remove-orphans app

            docker_cmd image prune -f
