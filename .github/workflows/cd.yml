name: CD (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi

            if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "GHCR_USERNAME or GHCR_TOKEN is empty"
              exit 1
            fi

            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export IMAGE_NAME="ghcr.io/${{ github.repository }}"
            export IMAGE_TAG="sha-${{ github.sha }}"

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml run --rm app pnpm exec prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans app

            docker image prune -f
