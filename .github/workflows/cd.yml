name: CD (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute deploy image name
        id: deploy_image
        run: echo "name=ghcr.nju.edu.cn/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify deploy images exist
        run: |
          docker buildx imagetools inspect "${{ steps.image.outputs.name }}:sha-${{ github.sha }}" >/dev/null

      - name: Prepare remote deploy path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 60s
          command_timeout: 200m
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/deploy/nginx/conf.d"

      - name: Upload deployment files (attempt 1)
        id: upload_files_attempt_1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 90s
          command_timeout: 10m
          source: docker-compose.prod.yml,deploy/nginx/conf.d/default.conf
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Upload deployment files (attempt 2)
        id: upload_files_attempt_2
        if: steps.upload_files_attempt_1.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 90s
          command_timeout: 10m
          source: docker-compose.prod.yml,deploy/nginx/conf.d/default.conf
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Check upload result
        if: steps.upload_files_attempt_1.outcome == 'failure' && steps.upload_files_attempt_2.outcome == 'failure'
        run: |
          echo "Upload deployment files failed after 2 attempts."
          echo "Please verify DEPLOY_HOST/DEPLOY_PORT reachability from GitHub runners and server firewall/fail2ban rules."
          exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 60s
          command_timeout: 110m
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi

            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f "docker-compose.prod.yml" ]; then
              echo "docker-compose.prod.yml not found under DEPLOY_PATH"
              exit 1
            fi
            if [ ! -f "deploy/nginx/conf.d/default.conf" ]; then
              echo "deploy/nginx/conf.d/default.conf not found under DEPLOY_PATH"
              exit 1
            fi

            # Optional: write .env from GitHub secret DEPLOY_ENV_B64.
            if [ -n "${{ secrets.DEPLOY_ENV_B64 }}" ]; then
              echo "${{ secrets.DEPLOY_ENV_B64 }}" | base64 -d > .env
              chmod 600 .env
            fi

            if [ ! -f ".env" ]; then
              echo ".env not found under DEPLOY_PATH and DEPLOY_ENV_B64 is empty"
              exit 1
            fi

            upsert_env_var() {
              key="$1"
              value="$2"
              if [ -z "$value" ]; then
                return 0
              fi

              tmp_file="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN {
                  found = 0
                  gsub(/\\/,"\\\\", value)
                  gsub(/"/,"\\\"", value)
                }
                $0 ~ ("^" key "=") {
                  print key "=\"" value "\""
                  found = 1
                  next
                }
                { print }
                END {
                  if (!found) {
                    print key "=\"" value "\""
                  }
                }
              ' .env > "$tmp_file"
              mv "$tmp_file" .env
            }

            wechat_secret_count=0
            [ -n "${{ secrets.PROD_WECHAT_OA_APP_ID }}" ] && wechat_secret_count=$((wechat_secret_count + 1))
            [ -n "${{ secrets.PROD_WECHAT_OA_APP_SECRET }}" ] && wechat_secret_count=$((wechat_secret_count + 1))
            [ -n "${{ secrets.PROD_WECHAT_OA_TOKEN }}" ] && wechat_secret_count=$((wechat_secret_count + 1))
            [ -n "${{ secrets.PROD_WECHAT_OA_ENCODING_AES_KEY }}" ] && wechat_secret_count=$((wechat_secret_count + 1))

            if [ "$wechat_secret_count" -ne 0 ] && [ "$wechat_secret_count" -ne 4 ]; then
              echo "PROD_WECHAT_OA_* secrets must be configured together (0 or 4 set)."
              exit 1
            fi

            if [ "$wechat_secret_count" -eq 4 ]; then
              upsert_env_var WECHAT_OA_APP_ID "${{ secrets.PROD_WECHAT_OA_APP_ID }}"
              upsert_env_var WECHAT_OA_APP_SECRET "${{ secrets.PROD_WECHAT_OA_APP_SECRET }}"
              upsert_env_var WECHAT_OA_TOKEN "${{ secrets.PROD_WECHAT_OA_TOKEN }}"
              upsert_env_var WECHAT_OA_ENCODING_AES_KEY "${{ secrets.PROD_WECHAT_OA_ENCODING_AES_KEY }}"
              chmod 600 .env
            fi

            if ! command -v docker >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                curl -fsSL https://get.docker.com | sh
              elif command -v sudo >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
              else
                echo "docker is not installed and sudo is unavailable"
                exit 1
              fi
            fi

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              elif command -v sudo >/dev/null 2>&1 && sudo docker info >/dev/null 2>&1; then
                sudo --preserve-env=IMAGE_NAME,IMAGE_TAG docker "$@"
              else
                echo "cannot access docker daemon"
                exit 1
              fi
            }

            wait_healthy() {
              container="$1"
              retries=60
              i=1
              while [ "$i" -le "$retries" ]; do
                status="$(docker_cmd inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  return 0
                fi
                sleep 2
                i=$((i + 1))
              done
              echo "$container did not become healthy"
              docker_cmd logs --tail=100 "$container" || true
              return 1
            }

            cleanup_old_release_images() {
              repo="$1"
              keep_image="$2"

              old_images="$(docker_cmd image ls "$repo" --format '{{.Repository}}:{{.Tag}}' | grep ':sha-' || true)"

              if [ -z "$old_images" ]; then
                return 0
              fi

              for image in $old_images; do
                if [ "$image" = "$keep_image" ]; then
                  echo "Keeping current release image: $image"
                  continue
                fi

                echo "Removing old release image: $image"
                docker_cmd image rm "$image" || true
              done
            }

            # Build artifacts are still published to ghcr.io.
            # Deploy uses the ghcr.nju.edu.cn mirror for faster pulls in mainland China.
            export IMAGE_NAME="${{ steps.deploy_image.outputs.name }}"
            export IMAGE_TAG="sha-${{ github.sha }}"

            if [ -z "$IMAGE_NAME" ] || [ -z "$IMAGE_TAG" ]; then
              echo "IMAGE_NAME or IMAGE_TAG is empty"
              exit 1
            fi

            echo "Deploying app image: ${IMAGE_NAME}:${IMAGE_TAG}"

            docker_cmd compose -f docker-compose.prod.yml up -d db redis
            wait_healthy resume-db
            wait_healthy resume-redis
            docker_cmd compose -f docker-compose.prod.yml pull app nginx
            docker_cmd compose -f docker-compose.prod.yml run --rm app pnpm exec prisma migrate deploy
            docker_cmd compose -f docker-compose.prod.yml up -d --remove-orphans app nginx
            wait_healthy resume-app
            wait_healthy resume-nginx

            cleanup_old_release_images "$IMAGE_NAME" "${IMAGE_NAME}:${IMAGE_TAG}"
            docker_cmd image prune -f
