name: CD (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute deploy image name
        id: deploy_image
        run: echo "name=ghcr.nju.edu.cn/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify deploy images exist
        run: |
          docker buildx imagetools inspect "${{ steps.image.outputs.name }}:sha-${{ github.sha }}" >/dev/null

      - name: Prepare remote deploy path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 60s
          command_timeout: 200m
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/deploy/nginx/conf.d"

      - name: Upload deployment files (attempt 1)
        id: upload_files_attempt_1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 90s
          command_timeout: 10m
          source: docker-compose.prod.yml,deploy/nginx/conf.d/default.conf
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Upload deployment files (attempt 2)
        id: upload_files_attempt_2
        if: steps.upload_files_attempt_1.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 90s
          command_timeout: 10m
          source: docker-compose.prod.yml,deploy/nginx/conf.d/default.conf
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Check upload result
        if: steps.upload_files_attempt_1.outcome == 'failure' && steps.upload_files_attempt_2.outcome == 'failure'
        run: |
          echo "Upload deployment files failed after 2 attempts."
          echo "Please verify DEPLOY_HOST/DEPLOY_PORT reachability from GitHub runners and server firewall/fail2ban rules."
          exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          timeout: 60s
          command_timeout: 110m
          script_stop: true
          script: |
            set -euo pipefail
            CURRENT_STAGE="bootstrap"

            on_exit() {
              status="$?"
              if [ "$status" -ne 0 ]; then
                echo "Deploy failed at stage: ${CURRENT_STAGE} (exit=${status})"
              fi
            }
            trap on_exit EXIT

            CURRENT_STAGE="validate_deploy_path_secret"
            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi

            CURRENT_STAGE="enter_deploy_path"
            cd "${{ secrets.DEPLOY_PATH }}"

            CURRENT_STAGE="validate_required_files"
            if [ ! -f "docker-compose.prod.yml" ]; then
              echo "docker-compose.prod.yml not found under DEPLOY_PATH"
              exit 1
            fi
            if [ ! -f "deploy/nginx/conf.d/default.conf" ]; then
              echo "deploy/nginx/conf.d/default.conf not found under DEPLOY_PATH"
              exit 1
            fi

            # Optional: write .env from GitHub secret DEPLOY_ENV_B64.
            # Supports both:
            # 1) Base64-encoded env content (recommended)
            # 2) Plain-text env content (fallback for misconfigured secret)
            CURRENT_STAGE="load_env_secret"
            if [ -n "${{ secrets.DEPLOY_ENV_B64 }}" ]; then
              raw_env_secret="${{ secrets.DEPLOY_ENV_B64 }}"
              tmp_env_file="$(mktemp)"
              env_loaded_mode=""

              if printf '%s' "$raw_env_secret" | base64 -d > "$tmp_env_file" 2>/dev/null; then
                env_loaded_mode="base64"
              elif printf '%s' "$raw_env_secret" | base64 --decode > "$tmp_env_file" 2>/dev/null; then
                env_loaded_mode="base64"
              else
                printf '%s\n' "$raw_env_secret" > "$tmp_env_file"
                env_loaded_mode="plain"
              fi

              if [ ! -s "$tmp_env_file" ]; then
                echo "DEPLOY_ENV_B64 resolved to empty content"
                rm -f "$tmp_env_file"
                exit 1
              fi

              if ! grep -Eq '^[A-Za-z_][A-Za-z0-9_]*=' "$tmp_env_file"; then
                echo "DEPLOY_ENV_B64 content is not a valid .env key-value payload"
                rm -f "$tmp_env_file"
                exit 1
              fi

              mv "$tmp_env_file" .env
              chmod 600 .env
              echo ".env loaded from DEPLOY_ENV_B64 (${env_loaded_mode})"
            fi

            CURRENT_STAGE="validate_env_file"
            if [ ! -f ".env" ]; then
              echo ".env not found under DEPLOY_PATH and DEPLOY_ENV_B64 is empty"
              exit 1
            fi

            CURRENT_STAGE="prepare_upsert_helper"
            upsert_env_var() {
              key="$1"
              value="$2"
              if [ -z "$value" ]; then
                return 0
              fi

              tmp_file="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN {
                  found = 0
                  gsub(/\\/,"\\\\", value)
                  gsub(/"/,"\\\"", value)
                }
                $0 ~ ("^" key "=") {
                  print key "=\"" value "\""
                  found = 1
                  next
                }
                { print }
                END {
                  if (!found) {
                    print key "=\"" value "\""
                  }
                }
              ' .env > "$tmp_file"
              mv "$tmp_file" .env
            }

            CURRENT_STAGE="count_wechat_overlay_secrets"
            wechat_secret_count=0
            if [ -n "${{ secrets.PROD_WECHAT_OA_APP_ID }}" ]; then
              wechat_secret_count=$((wechat_secret_count + 1))
            fi
            if [ -n "${{ secrets.PROD_WECHAT_OA_APP_SECRET }}" ]; then
              wechat_secret_count=$((wechat_secret_count + 1))
            fi
            if [ -n "${{ secrets.PROD_WECHAT_OA_TOKEN }}" ]; then
              wechat_secret_count=$((wechat_secret_count + 1))
            fi
            if [ -n "${{ secrets.PROD_WECHAT_OA_ENCODING_AES_KEY }}" ]; then
              wechat_secret_count=$((wechat_secret_count + 1))
            fi

            CURRENT_STAGE="validate_wechat_overlay_secrets"
            if [ "$wechat_secret_count" -ne 0 ] && [ "$wechat_secret_count" -ne 4 ]; then
              echo "PROD_WECHAT_OA_* secrets must be configured together (0 or 4 set)."
              exit 1
            fi

            CURRENT_STAGE="apply_wechat_overlay_if_present"
            if [ "$wechat_secret_count" -eq 4 ]; then
              upsert_env_var WECHAT_OA_APP_ID "${{ secrets.PROD_WECHAT_OA_APP_ID }}"
              upsert_env_var WECHAT_OA_APP_SECRET "${{ secrets.PROD_WECHAT_OA_APP_SECRET }}"
              upsert_env_var WECHAT_OA_TOKEN "${{ secrets.PROD_WECHAT_OA_TOKEN }}"
              upsert_env_var WECHAT_OA_ENCODING_AES_KEY "${{ secrets.PROD_WECHAT_OA_ENCODING_AES_KEY }}"
              chmod 600 .env
            fi

            CURRENT_STAGE="docker_preflight"
            echo "Preflight: checking docker runtime..."
            if ! docker info >/dev/null 2>&1 && ! sudo -n docker info >/dev/null 2>&1; then
              echo "Preflight: docker not found, attempting auto-install..."
              if [ "$(id -u)" -eq 0 ]; then
                curl -fsSL https://get.docker.com | sh
              elif sudo -n true >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
              else
                echo "docker is not installed and sudo is unavailable"
                exit 1
              fi
            else
              echo "Preflight: docker runtime is reachable"
            fi

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              elif sudo -n docker info >/dev/null 2>&1; then
                sudo -n --preserve-env=IMAGE_NAME,IMAGE_TAG docker "$@"
              else
                echo "cannot access docker daemon"
                exit 1
              fi
            }

            compose_cmd() {
              if docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                docker compose -f docker-compose.prod.yml "$@"
              elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker compose version >/dev/null 2>&1; then
                sudo -n --preserve-env=IMAGE_NAME,IMAGE_TAG docker compose -f docker-compose.prod.yml "$@"
              elif docker-compose version >/dev/null 2>&1; then
                docker-compose -f docker-compose.prod.yml "$@"
              elif sudo -n docker-compose version >/dev/null 2>&1; then
                sudo -n docker-compose -f docker-compose.prod.yml "$@"
              else
                echo "docker compose is unavailable (missing compose plugin/binary)"
                exit 1
              fi
            }

            wait_healthy() {
              container="$1"
              retries=60
              i=1
              while [ "$i" -le "$retries" ]; do
                status="$(docker_cmd inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  return 0
                fi
                sleep 2
                i=$((i + 1))
              done
              echo "$container did not become healthy"
              docker_cmd logs --tail=100 "$container" || true
              return 1
            }

            cleanup_old_release_images() {
              repo="$1"
              keep_image="$2"

              old_images="$(docker_cmd image ls "$repo" --format '{{.Repository}}:{{.Tag}}' | grep ':sha-' || true)"

              if [ -z "$old_images" ]; then
                return 0
              fi

              for image in $old_images; do
                if [ "$image" = "$keep_image" ]; then
                  echo "Keeping current release image: $image"
                  continue
                fi

                echo "Removing old release image: $image"
                docker_cmd image rm "$image" || true
              done
            }

            # Build artifacts are still published to ghcr.io.
            # Deploy uses the ghcr.nju.edu.cn mirror for faster pulls in mainland China.
            export IMAGE_NAME="${{ steps.deploy_image.outputs.name }}"
            export IMAGE_TAG="sha-${{ github.sha }}"

            CURRENT_STAGE="validate_image_ref"
            if [ -z "$IMAGE_NAME" ] || [ -z "$IMAGE_TAG" ]; then
              echo "IMAGE_NAME or IMAGE_TAG is empty"
              exit 1
            fi

            echo "Deploying app image: ${IMAGE_NAME}:${IMAGE_TAG}"

            CURRENT_STAGE="compose_validate"
            echo "Validating compose configuration..."
            if ! compose_cmd config -q; then
              echo "docker compose config validation failed"
              exit 1
            fi

            CURRENT_STAGE="compose_up_dependencies"
            compose_cmd up -d db redis
            CURRENT_STAGE="wait_db_healthy"
            wait_healthy resume-db
            CURRENT_STAGE="wait_redis_healthy"
            wait_healthy resume-redis
            CURRENT_STAGE="compose_pull_runtime_images"
            compose_cmd pull app nginx
            CURRENT_STAGE="run_prisma_migrate"
            compose_cmd run --rm app pnpm exec prisma migrate deploy
            CURRENT_STAGE="compose_up_app_nginx"
            compose_cmd up -d --remove-orphans app nginx
            CURRENT_STAGE="wait_app_healthy"
            wait_healthy resume-app
            CURRENT_STAGE="wait_nginx_healthy"
            wait_healthy resume-nginx

            CURRENT_STAGE="cleanup_old_images"
            cleanup_old_release_images "$IMAGE_NAME" "${IMAGE_NAME}:${IMAGE_TAG}"
            CURRENT_STAGE="prune_docker_images"
            docker_cmd image prune -f

            CURRENT_STAGE="done"
