name: Mirror Infra Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror Postgres and Redis to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: images
        run: |
          echo "postgres=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/resume-postgres:16" >> "$GITHUB_OUTPUT"
          echo "redis=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/resume-redis:8.4-alpine" >> "$GITHUB_OUTPUT"

      - name: Mirror Postgres
        run: |
          docker pull postgres:16
          docker tag postgres:16 "${{ steps.images.outputs.postgres }}"
          docker push "${{ steps.images.outputs.postgres }}"

      - name: Mirror Redis
        run: |
          docker pull redis:8.4-alpine
          docker tag redis:8.4-alpine "${{ steps.images.outputs.redis }}"
          docker push "${{ steps.images.outputs.redis }}"
